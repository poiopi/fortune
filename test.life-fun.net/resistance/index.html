<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フォーチューン ハザード - プロトタイプ Ver.5.01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <!-- 画面フラッシュ用 -->
    <div id="screen-flash"></div>

    <!-- 1. タイトル/入力画面 -->
    <div id="screen-title" class="screen active">
        <!-- 
            ★ロゴ画像枠：後ほどsrc属性を指定してご活用ください。
            その際、下のh1タグを非表示または削除してください。 
            <img src="logo.png" alt="フォーチューン ハザード" class="game-logo">
        -->
        <h1>フォーチューン ハザード</h1>
        <p>名前と生年月日を入力してね</p>
        <input type="text" id="player-name" placeholder="お名前" value="リーダー">
        <input type="date" id="player-dob" value="2000-01-01">
        <select id="player-gender">
            <option value="female">女の子（主人公）</option>
            <option value="male">男の子（主人公）</option>
        </select>
        <!-- ルール4：すべてのonclick属性を完全に廃止し、IDによる紐付けに統一 -->
        <button id="title-start-btn">ゲームスタート</button>
    </div>

    <!-- 1.5. オープニング画面 -->
    <div id="screen-opening" class="screen" style="background-color: #ffeef2;">
        <button id="op-skip-btn" class="skip-btn">スキップ ≫</button>
        <h1>プロローグ</h1>
        <div id="opening-text-container">
            <p style="font-size: 15px; line-height: 1.8; color: #444; margin: 0;">
                時は20XX年。<br>
                平和な世界は突如として暗雲に包まれる。<br><br>
                どこからともなく現れたゾンビが町を襲い、人々はパニックに陥った。<br><br>
                それから一月後……。<br>
                生き残った人々は「レジスタンス」を結成。<br>
                ゾンビたちを打倒し、再び平和な日常を取り戻すために立ち上がった。<br><br>
                若きリーダーであるあなた（主人公）は、大切な仲間たちと共に、いま最後の戦いに赴く――。
            </p>
        </div>
        <button id="op-next-btn" style="width: 60%;">次へ進む</button>
    </div>

    <!-- 2. ノベル画面（共通） -->
    <div id="screen-novel" class="screen">
        <div id="character-stand">【立ち絵表示】</div>
        <div id="novel-box" class="novel-box-common">
            <strong id="novel-name" style="color: #d05a7f;"></strong>
            <p id="novel-text" style="margin-top: 5px;"></p>
        </div>
    </div>

    <!-- 3. シューティング画面 -->
    <div id="screen-shooting" class="screen" style="padding: 0;">
        <div id="game-ui">
            <div id="stage-title" style="margin-bottom: 4px; font-size: 16px;">STAGE 1</div>
            <!-- ルール4適用：JSで書き換えるための要素を定義 -->
            <div id="stage-objective" style="margin-bottom: 4px;"></div>
            <div>撃退数: <span id="kill-count">0</span></div>
            <div>スコア: <span id="score-val">0</span> 点</div>
            
            <!-- HP表示領域 -->
            <div id="hp-bar-area">
                HP: <span id="hp-value">100</span> / 100
                <div id="hp-gauge-container">
                    <div id="hp-gauge-bar"></div>
                </div>
            </div>
            
            <div id="boss-hp-area" style="display: none; color: #b085f5; font-weight: bold;">BOSS HP: <span id="boss-hp-val">100</span></div>
            <div id="ally-status" style="margin-top: 4px; color: #40c057;"></div>
        </div>
        <div id="bomb-button">BOMB<br><span id="bomb-count">0</span></div>
        
        <!-- 戦闘中割り込みダイアログ用 -->
        <div id="battle-talk-box" class="novel-box-common" style="display: none;">
            <strong id="battle-talk-speaker" style="color: #d05a7f;"></strong>
            <p id="battle-talk-text" style="margin-top: 5px;"></p>
        </div>
        
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- 4. ステージクリア / 進行画面 -->
    <div id="screen-clear" class="screen">
        <h1 id="clear-title">STAGE CLEAR!</h1>
        <p id="clear-status" style="text-align: center; margin-bottom: 20px;"></p>
        <button id="next-chapter-btn">チャプター2へ進む</button>
        <button id="restart-btn" style="display: none; background-color: #ccc;">最初から遊ぶ</button>
    </div>

</div>

<!-- ルール4：メインモジュールJSをロード -->
<script type="module" src="js/main.js"></script>
</body>
</html>
```
