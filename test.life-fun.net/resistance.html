<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>レジスタンスの夜明け - プロトタイプ</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #f7e6eb;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; user-select: none;
        }
        #game-container {
            width: 100%; max-width: 400px; height: 100vh; max-height: 700px;
            background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative; display: flex; flex-direction: column;
            border-radius: 8px; overflow: hidden;
        }
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; box-sizing: border-box; padding: 20px;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .active { display: flex; }
        h1 { color: #d05a7f; font-size: 24px; margin-bottom: 20px; }
        p { color: #555; line-height: 1.6; }
        input, select, button {
            width: 80%; padding: 12px; margin: 10px 0;
            border-radius: 20px; border: 2px solid #ffb7c5;
            font-size: 16px; outline: none; box-sizing: border-box;
        }
        button {
            background-color: #ffb7c5; color: white; font-weight: bold;
            border: none; cursor: pointer; transition: 0.2s;
        }
        button:active { background-color: #e09ba9; }
        #novel-box {
            background: rgba(255,255,255,0.9); border: 3px solid #ffb7c5;
            border-radius: 15px; padding: 15px; width: 90%; height: 150px;
            position: absolute; bottom: 20px; box-sizing: border-box; cursor: pointer;
        }
        #character-stand {
            width: 150px; height: 200px; background-color: #ffe0e6;
            border: 2px dashed #ffb7c5; display: flex; justify-content: center;
            align-items: center; color: #d05a7f; font-size: 14px;
            margin-bottom: 180px; border-radius: 10px;
        }
        canvas { background-color: #e3fafc; display: block; width: 100%; height: 100%; }
        #game-ui {
            position: absolute; top: 10px; left: 10px; color: #d05a7f;
            font-weight: bold; font-size: 18px; pointer-events: none;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="screen-title" class="screen active">
        <h1>レジスタンスの夜明け</h1>
        <p>名前と生年月日を入力してね</p>
        <input type="text" id="player-name" placeholder="お名前" value="リーダー">
        <input type="date" id="player-dob" value="2000-01-01">
        <select id="player-gender">
            <option value="female">女の子（主人公）</option>
            <option value="male">男の子（主人公）</option>
        </select>
        <button onclick="startGame()">ゲームスタート</button>
    </div>
    <div id="screen-novel" class="screen">
        <div id="character-stand">【パートナーの立ち絵】</div>
        <div id="novel-box" onclick="nextNovel()">
            <strong id="novel-name" style="color:#d05a7f;"></strong>
            <p id="novel-text" style="margin-top:5px;"></p>
        </div>
    </div>
    <div id="screen-shooting" class="screen" style="padding:0;">
        <div id="game-ui">ゾンビ撃退数: <span id="kill-count">0</span> / 5</div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="screen-clear" class="screen">
        <h1>STAGE 1 CLEAR!</h1>
        <p id="clear-status"></p>
        <p style="font-size:12px;color:#999;">（進行状況はブラウザに自動保存されました）</p>
        <button onclick="resetGame()">最初から遊ぶ（データを消す）</button>
    </div>
</div>
<script>
    let gameState={name:"",dob:"",gender:"",killCount:0,novelIndex:0};
    const novelData=[
        {name:"パートナー",text:"ついにここまで来たね…！街はかわいいゾンビたちでいっぱいだ。"},
        {name:"パートナー",text:"私の後ろについてきて。画面を左右にスライドして、ゾンビをやっつけよう！"},
        {name:"システム",text:"【シューティングパートが始まります】5体倒せばクリアです！"}
    ];
    function changeScreen(id){
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function startGame(){
        gameState.name=document.getElementById('player-name').value||"リーダー";
        gameState.dob=document.getElementById('player-dob').value;
        gameState.gender=document.getElementById('player-gender').value;
        localStorage.setItem('resistance_player_info',JSON.stringify({name:gameState.name,dob:gameState.dob,gender:gameState.gender}));
        gameState.novelIndex=0;
        showNovelStep();
        changeScreen('screen-novel');
    }
    function showNovelStep(){
        const c=novelData[gameState.novelIndex];
        document.getElementById('novel-name').innerText=c.name;
        document.getElementById('novel-text').innerText=c.text.replace("リーダー",gameState.name);
    }
    function nextNovel(){
        gameState.novelIndex++;
        if(gameState.novelIndex<novelData.length){showNovelStep();}
        else{changeScreen('screen-shooting');initShooting();}
    }
    const canvas=document.getElementById('gameCanvas');
    const ctx=canvas.getContext('2d');
    let animationId,player={x:200,y:550,width:40,height:40,color:'#ffb7c5'};
    let bullets=[],enemies=[],lastEnemyTime=0,isGameOver=false,lastShootTime=0;
    function initShooting(){
        canvas.width=canvas.parentNode.clientWidth;
        canvas.height=canvas.parentNode.clientHeight;
        player.x=canvas.width/2-player.width/2;
        player.y=canvas.height-100;
        bullets=[];enemies=[];gameState.killCount=0;
        document.getElementById('kill-count').innerText=0;
        isGameOver=false;
        const handleMove=(clientX)=>{
            const rect=canvas.getBoundingClientRect();
            player.x=(clientX-rect.left)-player.width/2;
            if(player.x<0)player.x=0;
            if(player.x>canvas.width-player.width)player.x=canvas.width-player.width;
        };
        canvas.addEventListener('mousemove',(e)=>handleMove(e.clientX));
        canvas.addEventListener('touchmove',(e)=>{if(e.touches[0])handleMove(e.touches[0].clientX);e.preventDefault();},{passive:false});
        lastEnemyTime=Date.now();
        loop();
    }
    function loop(){
        if(isGameOver)return;
        ctx.fillStyle='#e3fafc';ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle=player.color;ctx.beginPath();
        ctx.arc(player.x+player.width/2,player.y+player.height/2,player.width/2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffffff';ctx.font='10px sans-serif';ctx.fillText("L",player.x+16,player.y+24);
        let now=Date.now();
        if(now-lastShootTime>150){
            bullets.push({x:player.x+player.width/2-4,y:player.y,width:8,height:15,speed:8});
            lastShootTime=now;
        }
        if(now-lastEnemyTime>1500){
            enemies.push({x:Math.random()*(canvas.width-40),y:-40,width:35,height:35,color:'#96f2d7',speed:2});
            lastEnemyTime=now;
        }
        bullets.forEach((b,bi)=>{
            b.y-=b.speed;ctx.fillStyle='#ff6b8b';ctx.fillRect(b.x,b.y,b.width,b.height);
            if(b.y<-20)bullets.splice(bi,1);
        });
        enemies.forEach((e,ei)=>{
            e.y+=e.speed;ctx.fillStyle=e.color;ctx.beginPath();
            ctx.arc(e.x+e.width/2,e.y+e.height/2,e.width/2,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#333';ctx.fillRect(e.x+10,e.y+12,3,3);ctx.fillRect(e.x+22,e.y+12,3,3);
            bullets.forEach((b,bi)=>{
                if(b.x<e.x+e.width&&b.x+b.width>e.x&&b.y<e.y+e.height&&b.y+b.height>e.y){
                    enemies.splice(ei,1);bullets.splice(bi,1);
                    gameState.killCount++;
                    document.getElementById('kill-count').innerText=gameState.killCount;
                    if(gameState.killCount>=5)endGame(true);
                }
            });
            if(e.y>canvas.height)enemies.splice(ei,1);
        });
        animationId=requestAnimationFrame(loop);
    }
    function endGame(isWin){
        isGameOver=true;cancelAnimationFrame(animationId);
        if(isWin){
            let d=JSON.parse(localStorage.getItem('resistance_player_info'))||{};
            d.progress="chapter1_clear";
            localStorage.setItem('resistance_player_info',JSON.stringify(d));
            document.getElementById('clear-status').innerText=gameState.name+'さん（生年月日: '+gameState.dob+'）は、無事最初の戦いを生き延びました！';
            changeScreen('screen-clear');
        }
    }
    function resetGame(){localStorage.removeItem('resistance_player_info');changeScreen('screen-title');}
</script>
</body>
</html>
